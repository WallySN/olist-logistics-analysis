version: '3.8'

services:
  # ============================================
  # 1. BASE DE DATOS POSTGRESQL
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: olist_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: olist_user
      POSTGRES_PASSWORD: olist_pass
      POSTGRES_DB: olist_db
    ports:
      - "5432:5432"  # Acceso desde tu PC
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./archive:/docker-entrypoint-initdb.d/csv:ro  # CSVs disponibles
    networks:
      - olist_network

  # ============================================
  # 2. APLICACIÓN PYTHON (tu análisis)
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: olist_app
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: olist_db
      DB_USER: olist_user
      DB_PASSWORD: olist_pass
    volumes:
      - ./scripts:/app/scripts      # Scripts editables
      - ./archive:/app/archive    # Datos CSV
      - ./images:/app/images      # Gráficos de salida
      - ./sql:/app/sql            # Queries SQL
    networks:
      - olist_network
    # Mantener el contenedor vivo para poder ejecutar scripts manualmente
    command: tail -f /dev/null

  # ============================================
  # 3. PGADMIN (opcional, para ver la BD visualmente)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: olist_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@olist.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - olist_network
    depends_on:
      - postgres

# ============================================
# VOLÚMENES (persistencia de datos)
# ============================================
volumes:
  postgres_data:
  pgadmin_data:

# ============================================
# RED (comunicación entre contenedores)
# ============================================
networks:
  olist_network:
    driver: bridge